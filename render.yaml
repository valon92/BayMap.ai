# BuyMap.ai — Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: buymap-api
    runtime: php
    region: frankfurt
    plan: free
    branch: main
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm ci
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: BuyMap.ai
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: SESSION_DRIVER
        value: array
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: AI_PROVIDER
        value: auto
      - key: OPENAI_ENABLED
        value: true
      - key: GEMINI_ENABLED
        value: true
      - key: EBAY_ENABLED
        value: true
      - key: SERPAPI_ENABLED
        value: true
      - key: APP_KEY
        generateValue: true
